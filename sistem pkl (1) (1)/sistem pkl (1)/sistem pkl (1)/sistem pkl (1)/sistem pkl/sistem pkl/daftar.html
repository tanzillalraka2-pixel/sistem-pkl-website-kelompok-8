<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran PKL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="2.css">
</head>

<body>

<section class="container p-5">

    <div class="card shadow">
        <div class="card-body">

            <h2 class="mb-4 text-center">Form Pendaftaran PKL</h2>

            <form id="formDaftar">

                <div class="mb-3">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Kelas</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Jurusan</label>

                    <select class="form-select" required>
                        <option value="">Pilih Jurusan</option>
                        <option>RPL</option>
                        <option>Teknik Mesin</option>
                        <option>Teknik Elektro</option>
                        <option>DPIB</option>
                        <option>Teknik Kelistrikan</option>
                        <option>TKP</option>
                        <option>Teknik Otomotif</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">No Handphone</label>
                    <input type="tel" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tempat PKL</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Upload Surat Pengantar</label>
                    <input type="file" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Daftar
                </button>

                <div class="text-center mt-3">
                    <a href="index.html" class="btn btn-secondary w-100">
                        Kembali
                    </a>
                </div>

            </form>
            <div id="notif" class="alert alert-success mt-3 d-none" role="alert">
                Pendaftaran berhasil dikirim!
            </div>

        </div>
    </div>

</section>

<script src="daftar.js"></script>

</body>
</html>
